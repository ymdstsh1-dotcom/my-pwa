<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#5b6cff">
    <meta name="description" content="ベータ分布の積分（ベータ積分）の公式を12問で誘導しながら学ぶPWA">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="β積分">
    <title>ベータ分布の積分</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <link rel="stylesheet" href="style.css">
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [["\\(", "\\)"]],
                displayMath: [["\\[", "\\]"]],
            },
            chtml: {
                scale: 1.15,
            },
            startup: {
                typeset: false,
            },
        };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>
    <main class="app">

        <!-- スタート画面 -->
        <section id="screen-start" class="screen screen-center is-active">
            <div class="start-box">
                <p class="start-icon">∫</p>
                <h1 class="start-title">ベータ分布の積分</h1>
                <p class="start-sub">全12問で公式を導いてみよう</p>
                <button id="start-button" class="btn btn-primary btn-lg" type="button">次へ</button>
            </div>
        </section>

        <!-- 問題画面 -->
        <section id="screen-quiz" class="screen">
            <header class="quiz-header">
                <div class="progress">
                    <div class="progress-bar"><span id="progress-fill" class="progress-fill"></span></div>
                    <span id="progress-text" class="progress-text">1 / 12</span>
                </div>
            </header>

            <div class="card problem-card">
                <div id="problem-math" class="problem-math"></div>
            </div>

            <div id="choices" class="choices"></div>

            <p id="feedback" class="feedback" aria-live="polite"></p>

            <div id="explanation" class="explanation is-hidden" aria-live="polite">
                <div id="explanation-math"></div>
            </div>

            <button id="next-button" class="btn btn-primary btn-lg btn-next" type="button" hidden>次の問題</button>
        </section>

        <!-- クリア画面 -->
        <section id="screen-clear" class="screen screen-center">
            <div class="clear-box">
                <p class="clear-face">(・・)っ　＜やった！</p>
                <h2 class="clear-title">全問クリア！</h2>
                <p class="clear-formula-label">これがベータ積分の公式</p>
                <div id="clear-formula" class="clear-formula"></div>
                <button id="restart-button" class="btn btn-outline btn-lg" type="button">もう一度</button>
            </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
