<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SVG to PNG Converter</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background: #f0f2f5; }
        .btn { padding: 12px 24px; font-size: 1rem; margin: 10px; cursor: pointer; border: none; border-radius: 8px; background: #007bff; color: white; font-weight: bold; }
        .btn:active { opacity: 0.8; }
        .preview { margin-top: 20px; border: 1px solid #ccc; background: white; padding: 10px; display: inline-block; }
    </style>
</head>
<body>
    <h2>PWAアイコン変換ツール</h2>
    <p>下のボタンを押すと、現在のSVGから各サイズのPNGを生成してダウンロードします。</p>
    
    <button class="btn" onclick="downloadPNG(192, 'icon192.png')">192x192 PNG ダウンロード</button>
    <button class="btn" onclick="downloadPNG(512, 'icon512.png')">512x512 PNG ダウンロード</button>
    
    <br>
    <div class="preview">
        <h3>現在のアイコン（SVGプレビュー）</h3>
        <svg id="source-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="256" height="256">
            <rect width="100%" height="100%" fill="#ffffff" rx="64"/>
            <path d="M 80 432 V 97 C 140 160, 250 340, 452 364 V 432 H 80 Z" fill="#d1e9ff"/>
            <path d="M 80 60 V 432 H 452" stroke="#666" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M 80 97 C 140 160, 250 340, 452 364" stroke="royalblue" stroke-width="8" fill="none" stroke-linecap="round"/>
            <text x="200" y="160" font-family="sans-serif" font-size="70" font-weight="bold" fill="black"><tspan font-style="italic">X</tspan>~Ex</text>
        </svg>
    </div>

    <script>
        function downloadPNG(size, filename) {
            const svgElement = document.getElementById('source-svg');
            const svgString = new XMLSerializer().serializeToString(svgElement);
            
            // width/heightをターゲットサイズに書き換えたSVGデータを作成
            const parser = new DOMParser();
            const doc = parser.parseFromString(svgString, 'image/svg+xml');
            const targetSvg = doc.documentElement;
            targetSvg.setAttribute('width', size);
            targetSvg.setAttribute('height', size);
            
            const updatedSvgString = new XMLSerializer().serializeToString(targetSvg);
            const blob = new Blob([updatedSvgString], { type: 'image/svg+xml;charset=utf-8' });
            const URL = window.URL || window.webkitURL || window;
            const blobURL = URL.createObjectURL(blob);
            
            const image = new Image();
            image.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const context = canvas.getContext('2d');
                
                // 背景を白でクリア（透過防止）
                context.fillStyle = '#ffffff';
                context.fillRect(0, 0, size, size);
                
                context.drawImage(image, 0, 0, size, size);
                
                const pngURL = canvas.toDataURL('image/png');
                const downloadLink = document.createElement('a');
                downloadLink.href = pngURL;
                downloadLink.download = filename;
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
                URL.revokeObjectURL(blobURL);
            };
            image.src = blobURL;
        }
    </script>
</body>
</html>
